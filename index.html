<p id="version" style="
font-size:22px;
font-family:Arial;
letter-spacing:2px;
opacity:0;
transition: opacity 2s ease;
"></p>

<script>

function numberToOrdinal(n){

const ones = [
"Zero","First","Second","Third","Fourth","Fifth","Sixth","Seventh",
"Eighth","Ninth","Tenth","Eleventh","Twelfth","Thirteenth","Fourteenth",
"Fifteenth","Sixteenth","Seventeenth","Eighteenth","Nineteenth"
];

const tens = ["","","Twenty","Thirty","Forty","Fifty","Sixty","Seventy","Eighty","Ninety"];

if(n < 20) return ones[n];

let ten = Math.floor(n/10);
let one = n % 10;

if(n < 100){
return tens[ten] + (one ? "-" + ones[one].toLowerCase() : "");
}

return n + "th";
}

const versionNumber = 19;

const text =
numberToOrdinal(versionNumber) + " Edition";

const box = document.getElementById("version");

box.textContent = text;

// small fade-in effect
setTimeout(()=>{
box.style.opacity = 1;
},200);

</script>
