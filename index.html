<!DOCTYPE html>
<html lang="it">
<head>
<meta charset="UTF-8">
<title>Théven</title>
<link rel="stylesheet" href="style.css">
</head>
<body>
<div id="onlineCounter" style="
  position: fixed;
  top: 10px;
  right: 10px;
  background: rgba(0,0,0,0.1);
  color: #000;
  padding: 5px 10px;
  border-radius: 5px;
  font-size: 0.9em;
  font-family: sans-serif;
  text-align: right;
  line-height: 1.3em;
">
  <div>Online: <span id="onlineUsers">0</span></div>
  <div>Totale visitatori: <span id="totalUsers">0</span></div>
</div>

<div class="counter">
  <h1>Contatore utenti</h1>
  Utenti online: <span id="onlineUsers">0</span>
</div>

<h1>Welcome, I am Théven and I have a passion for electrical circuits</h1>
<p class="version">This is my second website, <span id="versionText"></span> edition</p>

<h2>Let's share:</h2>
<form action="https://formspree.io/f/mbdyvzqa" method="POST">
  <textarea name="message" required rows="4" placeholder="Message"></textarea>
  <input type="email" name="email" placeholder="Email">
  <button type="submit">Send</button>
</form>

<div id="bibleVerse"></div>

<script>
// Versione del sito
const versionWords = [
  "twenty-sixth","twenty-seventh","Twenty-eighth","Twenty-ninth","Thirtieth"
];
document.getElementById("versionText").textContent = versionWords[0];

// ID unico per ogni browser
const id = localStorage.getItem("visitorId") || crypto.randomUUID();
localStorage.setItem("visitorId", id);

// Funzione per aggiornare il contatore
async function updateOnlineUsers(){
  try{
    await fetch('http://localhost:3000/online', {
      method:'POST',
      headers:{'Content-Type':'application/json'},
      body: JSON.stringify({id})
    });
    let res = await fetch('http://localhost:3000/count');
    let data = await res.json();
    document.getElementById("onlineUsers").textContent =
      "Users online: " + data.count;
  } catch(e){
    document.getElementById("onlineUsers").textContent =
      "Users online: 1";
  }
}

// Aggiorna subito e poi ogni 10 secondi
updateOnlineUsers();
setInterval(updateOnlineUsers,10000);
</script>

<script src="script.js"></script>
</body>
</html>
