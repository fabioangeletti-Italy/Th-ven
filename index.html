<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <title>Théven</title>
    <style>
        body {
            background-image: url("https://cdn.phototourl.com/uploads/2026-01-31-31eab6ed-14f7-4c2a-af8b-ae1cc5042e22.jpg");
            background-size: cover;
            background-position: center;
            background-attachment: fixed;
            background-repeat: no-repeat;
            color: white;
            font-family: Arial, sans-serif;
            display: flex;
            flex-direction: column;
            align-items: center;
            text-align: center;
            padding: 20px;
        }

        h1, h2, p {
            margin-bottom: 15px;
        }

        #versionText {
            font-weight: bold;
        }

        form {
            background-color: rgba(0, 0, 0, 0.6);
            padding: 20px;
            border-radius: 15px;
            max-width: 400px;
            width: 100%;
            box-shadow: 0 4px 15px rgba(0,0,0,0.4);
        }

        form textarea, form input {
            width: 100%;
            padding: 10px;
            border-radius: 10px;
            border: 1px solid #ccc;
            font-size: 14px;
            margin-bottom: 12px;
        }

        form textarea {
            resize: none;
        }

        form button {
            width: 100%;
            padding: 12px;
            border-radius: 10px;
            border: none;
            font-size: 15px;
            cursor: pointer;
            background-color: #1e90ff;
            color: white;
            transition: background-color 0.3s;
        }

        form button:hover {
            background-color: #63b3ff;
        }

        img {
            margin-bottom: 20px;
        }
    </style>
</head>
<body>
    <img src="https://hits.sh/fabioangeletti-italy.github.io/Th-ven.svg?style=flat-square&label=views&color=blue" alt="contatore visite">
    
    <h1>Welcome, I am Théven and I have a passion for electrical circuits</h1>
    
    <p>This is my second website, <span id="versionText"></span> Edition</p>
    
    <h2>Let's share:</h2>
    
    <form action="https://formspree.io/f/mbdyvzqa" method="POST">
        <textarea id="message" name="message" required rows="4" placeholder="Message"></textarea>
        <input id="email" type="email" name="email" placeholder="Email">
        <button type="submit">Send</button>
    </form>

    <p id="bibleVerse"></p>

    <script>
        const versionWords = [
           "Twenty-first","Twenty-second","Twenty-third","Twenty-fourth","Twenty-fifth",
            "Twenty-sixth","Twenty-seventh","Twenty-eighth","Twenty-ninth","Thirtieth",
            "Thirty-first","Thirty-second","Thirty-third","Thirty-fourth","Thirty-fifth",
            "Thirty-sixth","Thirty-seventh","Thirty-eighth","Thirty-ninth","Fortieth",
            "Forty-first","Forty-second","Forty-third","Forty-fourth","Forty-fifth",
            "Forty-sixth","Forty-seventh","Forty-eighth","Forty-ninth","Fiftieth"
        ];
        document.getElementById("versionText").textContent = versionWords[0];
    </script>
    <script src="script.js"></script>
</body>
</html>
