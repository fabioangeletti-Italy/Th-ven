    <h2>Let's share:</h2>
    <form action="https://formspree.io/f/mbdyvzqa" method="POST">
        <label for="message">Message:</label>
        <br>
        <textarea id="message" name="message" required></textarea>
        <br><br>
        <label for="email">Email:</label>
        <input id="email" type="email" name="email">
        <br><br>
        <button type="submit">Send</button>
    </form>
<script>
const form = document.querySelector("form");
form.addEventListener("submit", function(e) {
    e.preventDefault(); // blocca invio automatico
    const messageBox = document.getElementById("message");
    const emailBox = document.getElementById("email");
    const message = messageBox.value.trim();
    if (message.length === 0) {
        alert("Per favore, scrivi un messaggio valido.");
        return;
    }
    // crea FormData
    const data = new FormData();
    data.append("message", message);
    data.append("email", emailBox.value);

    // invia a Formspree
    fetch(form.action, {
        method: "POST",
        body: data,
        headers: {
            'Accept': 'application/json'
        }
    })
    .then(response => {
        if (response.ok) {
            alert("Messaggio inviato con successo!");
            messageBox.value = "";
            emailBox.value = "";
        } else {
            alert("C'è stato un errore, riprova.");
        }
    })
    .catch(() => alert("C'è stato un errore, riprova."));
});
</script>
