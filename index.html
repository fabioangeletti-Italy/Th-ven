<!DOCTYPE html>
<html lang="it">
<head>
<meta charset="UTF-8">
<title>Théven</title>
<link rel="stylesheet" href="style.css">
</head>
<body>
<h1>Welcome, I am Théven and I have a passion for electrical circuits</h1>
<p class="version">This is my second website, <span id="versionText"></span> edition</p>
<h2>Let's share:</h2>
<form action="https://formspree.io/f/mbdyvzqa" method="POST">
  <textarea name="message" required rows="4" placeholder="Message"></textarea>
  <input type="email" name="email" placeholder="Email">
  <button type="submit">Send</button>
</form>
<div id="bibleVerse"></div>
<script>
const versionWords = [ // Versione del sito
  "twenty-sixth","twenty-seventh","Twenty-eighth","Twenty-ninth","Thirtieth"
];
document.getElementById("versionText").textContent = versionWords[0];
const id = localStorage.getItem("visitorId") || crypto.randomUUID();// ID unico per ogni browser
localStorage.setItem("visitorId", id);
async function updateOnlineUsers(){ // Funzione per aggiornare il contatore
  try{
    await fetch('http://localhost:3000/online', {
      method:'POST',
      headers:{'Content-Type':'application/json'},
      body: JSON.stringify({id})
    });
    let res = await fetch('http://localhost:3000/count');
    let data = await res.json();
    document.getElementById("onlineUsers").textContent =
      "Users online: " + data.count;
  } catch(e){
    document.getElementById("onlineUsers").textContent =
      "Users online: 1";
  }
}
updateOnlineUsers(); // Aggiorna subito e poi ogni 10 secondi
setInterval(updateOnlineUsers,10000);
</script>
<script src="script.js"></script>
</body>
</html>
