<!DOCTYPE html>
<html lang="it">
<head>
<meta charset="UTF-8">
<title>Théven</title>
<link rel="stylesheet" href="style.css">
</head>
<body>
<div id="totalSessions">
    Views: <span id="totalCount">0</span>
</div>
<h1>Welcome, I am Théven and I have a passion for electrical circuits</h1>
<p class="version">This is my second website, <span id="versionText"></span> edition</p>
<div class="form-wrapper">
    <h2>Let's share</h2>
    <form action="https://formspree.io/f/mbdyvzqa" method="POST">
        <textarea name="message" required rows="4" placeholder="Message"></textarea>
        <input type="email" name="email" placeholder="Email">
        <button type="submit">Send</button>
    </form>
</div>
<div id="bibleVerse"></div>
<script>
const versionWords = [
  "twenty-seventh","Twenty-eighth","Twenty-ninth","Thirtieth"
];
document.getElementById("versionText").textContent = versionWords[0];
</script>
<script>
const SERVER_URL = "https://online-counter-server.onrender.com"; 
const visitorId = localStorage.getItem("visitorId") || crypto.randomUUID();
localStorage.setItem("visitorId", visitorId);
async function updateGlobalViews() {
  const totalCountEl = document.getElementById("totalCount");
  try {
    // Registra la visita solo se c'è un visitorId
    if (visitorId) {
      await fetch(`${SERVER_URL}/online`, {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ id: visitorId })
      });
    }
    // Recupera il conteggio globale dal server
    const res = await fetch(`${SERVER_URL}/total`);
    if (!res.ok) throw new Error('Risposta del server non OK');
    const data = await res.json();
    // Aggiorna il contatore globale sulla pagina
    totalCountEl.textContent = data.total ?? 0;
  } catch (err) {
    console.error("Server non raggiungibile, mostro 2000", err);
    totalCountEl.textContent = 2000;
  }
}
// Aggiorna solo una volta al caricamento della pagina
updateGlobalViews();
</script>
<script src="script.js"></script>
</body>
</html>
