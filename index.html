 <form action="https://formspree.io/f/mbdyvzqa" method="POST" style="max-width:500px;margin:auto;font-family:Arial,sans-serif;">

                font-size:16px;
            "

    <div style="margin-bottom:18px;">
        <label>Email:</label>

            id="email"
            type="email"
            name="email"
            style="
                width:100%;
                padding:12px;
                border-radius:12px;
                border:1px solid #ccc;
                font-size:16px;
            "
        >
    </div>
    <div class="g-recaptcha" data-sitekey="TUA_SITE_KEY" style="margin-bottom:18px;"></div>
    <button 
        type="submit"
        style="
            width:100%;
            padding:14px;
            border:none;
            border-radius:12px;
            font-size:16px;
            cursor:pointer;
        "
    >
        Send
    </button>
</form>
