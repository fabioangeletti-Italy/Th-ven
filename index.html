<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <title>Théven</title>
    <style>
        body {
            margin: 0;
            height: 100vh;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            text-align: center;
            color: white;
            font-family: Arial, sans-serif;
            background-size: cover;
            background-position: center;
            animation: bgFade 30s infinite alternate ease-in-out;
        }

        @keyframes bgFade {
            0% {
                background-image: url("https://cdn.phototourl.com/uploads/2026-01-31-31eab6ed-14f7-4c2a-af8b-ae1cc5042e22.jpg");
            }
            100% {
                background-image: url("https://images.unsplash.com/photo-1506744038136-46273834b3fb");
            }
        }

        h1 {
            text-shadow: 0 0 15px rgba(255, 255, 255, 0.6);
        }

        #bibleVerse {
            font-size: 1.3em;
            max-width: 600px;
            margin-top: 30px;
            opacity: 0;
            transition: opacity 1.5s ease, transform 1.5s ease;
        }
    </style>
</head>

<body>

    <img src="https://hits.sh/fabioangeletti-italy.github.io/Th-ven.svg?style=flat-square&label=views&color=blue" alt="visite">

    <h1>Welcome, I am Théven</h1>

    <p>
        This is my second website, <span id="versionText"></span> Edition
    </p>

    <p id="bibleVerse"></p>

    <script>
        const versionWords = [
            "Twenty-first","Twenty-second","Twenty-third","Twenty-fourth","Twenty-fifth",
            "Twenty-sixth","Twenty-seventh","Twenty-eighth","Twenty-ninth","Thirtieth",
            "Thirty-first","Thirty-second","Thirty-third","Thirty-fourth","Thirty-fifth",
            "Thirty-sixth","Thirty-seventh","Thirty-eighth","Thirty-ninth","Fortieth"
        ];

        document.getElementById("versionText").textContent = versionWords[0];

        const bibleVerses = [
            "John 8:12 — I am the light of the world",
            "Psalm 23:1 — The Lord is my shepherd",
            "Philippians 4:13 — I can do all things through Christ who strengthens me",
            "Proverbs 3:5 — Trust in the Lord with all your heart"
        ];

        function showVerse() {
            const verseBox = document.getElementById("bibleVerse");

            // effetto dissolvenza + movimento
            verseBox.style.opacity = 0;
            verseBox.style.transform = "translateY(15px)";

            setTimeout(() => {
                verseBox.textContent = bibleVerses[Math.floor(Math.random() * bibleVerses.length)];
                verseBox.style.opacity = 1;
                verseBox.style.transform = "translateY(0px)";
            }, 1200);
        }

        document.addEventListener("DOMContentLoaded", () => {
            showVerse();                  // mostra subito un verso
            setInterval(showVerse, 300000); // cambia ogni 5 minuti
        });
    </script>

</body>
</html>
